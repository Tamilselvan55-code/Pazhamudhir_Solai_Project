<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <title>TM Pazhamudhir Solai</title>
  <defs>
    <!-- Green radial gradient background -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14532d"/>
    </radialGradient>
    <!-- Gold gradient for Vel -->
    <linearGradient id="velGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="40%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <!-- Gold gradient for halo -->
    <linearGradient id="haloGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Clip for rounded square -->
    <clipPath id="roundedSq">
      <rect width="512" height="512" rx="110" ry="110"/>
    </clipPath>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <!-- Gold glow -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bgGrad)"/>

  <!-- Subtle inner vignette overlay -->
  <rect width="512" height="512" rx="110" ry="110" fill="rgba(0,0,0,0.08)"/>

  <!-- Golden halo ring -->
  <circle cx="256" cy="245" r="128" fill="none" stroke="url(#haloGold)" stroke-width="4.5" opacity="0.9" filter="url(#goldGlow)"/>
  <!-- Inner halo ring -->
  <circle cx="256" cy="245" r="108" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>

  <!-- VEL (Spear) - main body shaft -->
  <g filter="url(#shadow)">
    <!-- Shaft -->
    <rect x="249" y="170" width="14" height="200" rx="7" fill="url(#velGold)"/>
    <!-- Spear head - upper diamond tip -->
    <polygon points="256,88 238,165 256,148 274,165" fill="url(#velGold)"/>
    <!-- Spear guard (cross-guard) wings -->
    <ellipse cx="256" cy="170" rx="34" ry="10" fill="url(#velGold)" opacity="0.95"/>
    <!-- Spear butt base -->
    <ellipse cx="256" cy="370" rx="9" ry="5" fill="#d97706" opacity="0.9"/>
    <!-- Center ridge highlight -->
    <rect x="253.5" y="140" width="5" height="225" rx="2.5" fill="#fef3c7" opacity="0.45"/>
  </g>

  <!-- Peacock feather accent - left -->
  <g opacity="0.85" filter="url(#goldGlow)">
    <path d="M256 245 Q210 220 195 190 Q205 215 218 230 Q195 225 182 215 Q200 238 220 248 Q200 248 185 255 Q207 262 225 258" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="192" cy="190" rx="8" ry="11" fill="#0d9488" opacity="0.7"/>
    <ellipse cx="192" cy="190" rx="4" ry="6" fill="#f59e0b" opacity="0.85"/>
  </g>
  <!-- Peacock feather accent - right -->
  <g opacity="0.85" filter="url(#goldGlow)">
    <path d="M256 245 Q302 220 317 190 Q307 215 294 230 Q317 225 330 215 Q312 238 292 248 Q312 248 327 255 Q305 262 287 258" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="320" cy="190" rx="8" ry="11" fill="#0d9488" opacity="0.7"/>
    <ellipse cx="320" cy="190" rx="4" ry="6" fill="#f59e0b" opacity="0.85"/>
  </g>

  <!-- Leaf / sprout motif at base of vel (grocery freshness) -->
  <g transform="translate(256, 385)">
    <!-- Left leaf -->
    <path d="M0,0 Q-28,-18 -20,-40 Q-8,-20 0,0" fill="#4ade80" opacity="0.9"/>
    <!-- Right leaf -->
    <path d="M0,0 Q28,-18 20,-40 Q8,-20 0,0" fill="#4ade80" opacity="0.9"/>
    <!-- Center leaf vein left -->
    <line x1="-10" y1="-20" x2="0" y2="0" stroke="#16a34a" stroke-width="1.2" opacity="0.7"/>
    <!-- Center leaf vein right -->
    <line x1="10" y1="-20" x2="0" y2="0" stroke="#16a34a" stroke-width="1.2" opacity="0.7"/>
    <!-- Small dot -->
    <circle cx="0" cy="0" r="3.5" fill="#fde68a"/>
  </g>

  <!-- Subtle divine dot rays (top) -->
  <g opacity="0.35" transform="translate(256,88)">
    <line x1="0" y1="-18" x2="0" y2="-30" stroke="#fef3c7" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="-14" x2="20" y2="-23" stroke="#fef3c7" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-12" y1="-14" x2="-20" y2="-23" stroke="#fef3c7" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>